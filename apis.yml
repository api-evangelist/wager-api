    name: Wager API - Sports Odds
    description: >-
      Real-time sports odds for game spreads, moneylines, totals, alternate spreads,
      alternate totals, half-time odds, winning margins, and player props across
      major sports including NFL, NCAA, NBA, MLB, NHL, soccer, tennis, and golf.
      Supports thousands of futures markets including Super Bowl, NCAA Playoffs,
      NBA Finals, Stanley Cup, Premier League, and major tennis tournaments.
