aid: wager-api
name: Wager API
description: >-
  Wager API is a modern sports betting data platform that enables developers to build
  sports betting applications, bots, and predictive models with a single API. The
  platform provides real-time sports odds including spreads, moneylines, totals, player
  props, and futures markets across NFL, NCAA, NBA, MLB, NHL, soccer, tennis, and golf.
  Wager API also delivers player statistics, projections, fantasy data, injury reports,
  lineup updates, game schedules, and depth charts, making it a comprehensive data
  source for sports betting and fantasy sports applications.
