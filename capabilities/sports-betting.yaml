naftiko: 1.0.0-alpha2
info:
  label: Wager API Sports Betting
  description: Workflow capability for sports betting applications using the Wager API. Combines real-time game odds, player
    props, futures markets, injury reports, and game schedules in a unified workflow. Designed for sports betting apps, bots,
    and predictive models needing comprehensive pre-game and in-game data across NFL, NCAA, NBA, MLB, NHL, soccer, tennis,
    and golf.
  tags:
  - Wager API
  - Sports Betting
  - Odds
  - Player Props
  - Futures
  - NFL
  - NBA
  - MLB
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WAGER_API_KEY: WAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: wager-api
    baseUri: https://api.wagerapi.com
    description: Wager API sports betting data platform
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{WAGER_API_KEY}}'
      placement: header
    resources:
    - name: odds
      path: /v1/odds
      description: Real-time game odds
      operations:
      - name: get-game-odds
        method: GET
        description: Get real-time game odds for spreads, moneylines, and totals
        inputParameters:
        - name: sport
          in: query
          type: string
          required: true
          description: Sport identifier
        - name: market
          in: query
          type: string
          required: false
          description: Odds market type filter
        - name: date
          in: query
          type: string
          required: false
          description: Date filter
        outputRawFormat: json
        outputParameters:
        - name: data
          type: array
          value: $.data
    - name: props
      path: /v1/props
      description: Player proposition odds
      operations:
      - name: get-player-props
        method: GET
        description: Get player proposition odds
        inputParameters:
        - name: sport
          in: query
          type: string
          required: true
          description: Sport identifier
        - name: game_id
          in: query
          type: string
          required: false
          description: Game identifier
        outputRawFormat: json
        outputParameters:
        - name: data
          type: array
          value: $.data
    - name: futures
      path: /v1/futures
      description: Futures and championship odds
      operations:
      - name: get-futures-odds
        method: GET
        description: Get futures and championship market odds
        inputParameters:
        - name: sport
          in: query
          type: string
          required: true
          description: Sport identifier
        - name: market
          in: query
          type: string
          required: false
          description: Futures market type
        outputRawFormat: json
        outputParameters:
        - name: data
          type: array
          value: $.data
    - name: players
      path: /v1/players
      description: Player information
      operations:
      - name: get-players
        method: GET
        description: Get player roster information
        inputParameters:
        - name: sport
          in: query
          type: string
          required: true
          description: Sport identifier
        - name: team_id
          in: query
          type: string
          required: false
          description: Team filter
        outputRawFormat: json
        outputParameters:
        - name: data
          type: array
          value: $.data
    - name: player-stats
      path: /v1/players/{playerId}/stats
      description: Player statistics
      operations:
      - name: get-player-stats
        method: GET
        description: Get player statistics and game log
        inputParameters:
        - name: playerId
          in: path
          type: string
          required: true
          description: Player identifier
        - name: season
          in: query
          type: string
          required: false
          description: Season year
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: player-projections
      path: /v1/players/{playerId}/projections
      description: Player projections
      operations:
      - name: get-player-projections
        method: GET
        description: Get statistical projections for a player's upcoming games
        inputParameters:
        - name: playerId
          in: path
          type: string
          required: true
          description: Player identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: injuries
      path: /v1/injuries
      description: Injury reports
      operations:
      - name: get-injury-reports
        method: GET
        description: Get current injury reports for players
        inputParameters:
        - name: sport
          in: query
          type: string
          required: true
          description: Sport identifier
        - name: status
          in: query
          type: string
          required: false
          description: Injury status filter
        outputRawFormat: json
        outputParameters:
        - name: data
          type: array
          value: $.data
    - name: games
      path: /v1/games
      description: Game schedules and results
      operations:
      - name: get-games
        method: GET
        description: Get game schedules, results, and status
        inputParameters:
        - name: sport
          in: query
          type: string
          required: true
          description: Sport identifier
        - name: date
          in: query
          type: string
          required: false
          description: Date filter
        outputRawFormat: json
        outputParameters:
        - name: data
          type: array
          value: $.data
    - name: depth-charts
      path: /v1/depth-charts
      description: Team depth charts
      operations:
      - name: get-depth-charts
        method: GET
        description: Get team depth charts for lineup analysis
        inputParameters:
        - name: sport
          in: query
          type: string
          required: true
          description: Sport identifier
        - name: team_id
          in: query
          type: string
          required: false
          description: Team filter
        outputRawFormat: json
        outputParameters:
        - name: data
          type: array
          value: $.data
  exposes:
  - type: rest
    port: 8080
    namespace: sports-betting-api
    description: Unified REST API for sports betting data workflows.
    resources:
    - path: /v1/odds
      name: game-odds
      description: Real-time game odds
      operations:
      - method: GET
        name: get-game-odds
        description: Get real-time game odds for spreads, moneylines, and totals
        call: wager-api.get-game-odds
        with:
          sport: rest.sport
          market: rest.market
          date: rest.date
        outputParameters:
        - type: array
          mapping: $.data
    - path: /v1/props
      name: player-props
      description: Player proposition odds
      operations:
      - method: GET
        name: get-player-props
        description: Get player prop odds
        call: wager-api.get-player-props
        with:
          sport: rest.sport
          game_id: rest.game_id
        outputParameters:
        - type: array
          mapping: $.data
    - path: /v1/futures
      name: futures
      description: Championship and season futures
      operations:
      - method: GET
        name: get-futures-odds
        description: Get futures and championship odds
        call: wager-api.get-futures-odds
        with:
          sport: rest.sport
          market: rest.market
        outputParameters:
        - type: array
          mapping: $.data
    - path: /v1/players
      name: players
      description: Player roster information
      operations:
      - method: GET
        name: get-players
        description: Get player roster information
        call: wager-api.get-players
        with:
          sport: rest.sport
        outputParameters:
        - type: array
          mapping: $.data
    - path: /v1/players/{playerId}/stats
      name: player-stats
      description: Player statistics
      operations:
      - method: GET
        name: get-player-stats
        description: Get player stats and game log
        call: wager-api.get-player-stats
        with:
          playerId: rest.playerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/players/{playerId}/projections
      name: player-projections
      description: Player statistical projections
      operations:
      - method: GET
        name: get-player-projections
        description: Get player projections for upcoming games
        call: wager-api.get-player-projections
        with:
          playerId: rest.playerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/injuries
      name: injuries
      description: Player injury reports
      operations:
      - method: GET
        name: get-injury-reports
        description: Get current injury reports
        call: wager-api.get-injury-reports
        with:
          sport: rest.sport
          status: rest.status
        outputParameters:
        - type: array
          mapping: $.data
    - path: /v1/games
      name: games
      description: Game schedules and results
      operations:
      - method: GET
        name: get-games
        description: Get game schedules and results
        call: wager-api.get-games
        with:
          sport: rest.sport
          date: rest.date
        outputParameters:
        - type: array
          mapping: $.data
    - path: /v1/depth-charts
      name: depth-charts
      description: Team depth charts
      operations:
      - method: GET
        name: get-depth-charts
        description: Get team depth charts
        call: wager-api.get-depth-charts
        with:
          sport: rest.sport
          team_id: rest.team_id
        outputParameters:
        - type: array
          mapping: $.data
  - type: mcp
    port: 9080
    namespace: sports-betting-mcp
    transport: http
    description: MCP server for AI-assisted sports betting analysis and model building.
    tools:
    - name: get-game-odds
      description: Get real-time game odds for any sport including spreads, moneylines, totals, and alternate lines. Supports
        NFL, NCAA, NBA, MLB, NHL, soccer, tennis, and golf.
      hints:
        readOnly: true
        openWorld: true
      call: wager-api.get-game-odds
      with:
        sport: tools.sport
        market: tools.market
        date: tools.date
        game_id: tools.game_id
      outputParameters:
      - type: array
        mapping: $.data
    - name: get-player-props
      description: Get player proposition odds for passing yards, points, home runs, and other stats
      hints:
        readOnly: true
        openWorld: true
      call: wager-api.get-player-props
      with:
        sport: tools.sport
        game_id: tools.game_id
        player_id: tools.player_id
        market: tools.market
      outputParameters:
      - type: array
        mapping: $.data
    - name: get-futures-odds
      description: Get championship and season futures odds including Super Bowl, NBA Finals, and more
      hints:
        readOnly: true
        openWorld: true
      call: wager-api.get-futures-odds
      with:
        sport: tools.sport
        market: tools.market
      outputParameters:
      - type: array
        mapping: $.data
    - name: get-injury-reports
      description: Get current player injury reports with status, practice participation, and return timeline
      hints:
        readOnly: true
        openWorld: true
      call: wager-api.get-injury-reports
      with:
        sport: tools.sport
        status: tools.status
      outputParameters:
      - type: array
        mapping: $.data
    - name: get-player-stats
      description: Get player statistics including season totals and game-by-game log
      hints:
        readOnly: true
        openWorld: true
      call: wager-api.get-player-stats
      with:
        playerId: tools.playerId
        season: tools.season
      outputParameters:
      - type: object
        mapping: $.
    - name: get-player-projections
      description: Get statistical projections for a player's upcoming games for model building
      hints:
        readOnly: true
        openWorld: true
      call: wager-api.get-player-projections
      with:
        playerId: tools.playerId
        game_id: tools.game_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-games
      description: Get game schedules and results for a sport with scores and status
      hints:
        readOnly: true
        openWorld: true
      call: wager-api.get-games
      with:
        sport: tools.sport
        date: tools.date
        status: tools.status
      outputParameters:
      - type: array
        mapping: $.data
    - name: get-depth-charts
      description: Get team depth charts showing starter and backup designations by position
      hints:
        readOnly: true
        openWorld: true
      call: wager-api.get-depth-charts
      with:
        sport: tools.sport
        team_id: tools.team_id
      outputParameters:
      - type: array
        mapping: $.data
